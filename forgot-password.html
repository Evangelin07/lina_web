<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password — Lina Community</title>
  <meta name="description" content="Reset your Lina Community password.">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="auth-page">

<div class="auth-container" style="max-width:500px; grid-template-columns: 1fr;">
  <!-- Form side only -->
  <div class="auth-form-side" style="padding:40px;">
    <div class="auth-logo" style="justify-content:center;">
      <div class="brand-icon"><i class="fa-solid fa-layer-group"></i></div>
      Lina Community
    </div>
    <h1 class="auth-title" style="text-align:center;">Forgot Password</h1>
    <p class="auth-subtitle" style="text-align:center;">Enter your email to receive a password reset link.</p>

    <form id="forgot-password-form" novalidate>
      <div class="form-group">
        <label class="form-label" for="forgot-email">Email Address <span style="color:var(--danger)">*</span></label>
        <div class="input-group">
          <input type="email" id="forgot-email" class="form-control" placeholder="you@example.com" required>
        </div>
      </div>

      <button type="submit" class="btn btn-primary btn-full btn-lg">
        <i class="fa-solid fa-paper-plane"></i> Send Reset Link
      </button>
    </form>

    <div class="auth-footer" style="text-align:center; margin-top:20px;">
      Remember your password? <a href="login.html">Sign in</a>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
