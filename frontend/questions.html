<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Questions — Lina Community</title>
  <meta name="description" content="Browse all questions asked by the Lina Community.">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
<div class="overlay" id="sidebar-overlay"></div>

<nav class="navbar">
  <button class="hamburger" id="hamburger" aria-label="Toggle menu"><span></span><span></span><span></span></button>
  <a href="index.html" class="navbar-brand">
    <div class="brand-icon"><i class="fa-solid fa-layer-group"></i></div>
    <span>Lina Community</span>
  </a>
  <div class="navbar-search">
    <i class="fa-solid fa-magnifying-glass search-icon"></i>
    <input type="search" placeholder="Search questions, tags, users…">
  </div>
  <div class="navbar-actions">
    <div class="dropdown" id="notifications-dropdown-trigger">
      <button class="icon-btn" title="Notifications">
        <i class="fa-regular fa-bell"></i>
        <span class="badge" id="notifications-badge" style="display:none;">0</span>
      </button>
      <div class="dropdown-menu hidden notifications-dropdown" id="notifications-menu">
        <div class="notifications-header">
          <h3>Notifications</h3>
          <span class="mark-all" id="mark-notifications-read">Mark all as read</span>
        </div>
        <div class="notifications-list" id="notifications-list">
          <!-- JS populates this -->
          <div class="notifications-empty">
            <i class="fa-regular fa-bell"></i>
            <p>No new notifications</p>
          </div>
        </div>
      </div>
    </div>
    <div class="dropdown">
      <div id="nav-avatar-wrap" style="display:flex;align-items:center;gap:8px;cursor:pointer;">
        <img src="" alt="avatar" class="avatar avatar-dropdown-trigger" id="navbar-avatar" style="display:none;">
      </div>
      <div class="dropdown-menu hidden avatar-dropdown-menu">
        <!-- JS populates this dynamically -->
      </div>
    </div>
    <a href="ask-question.html" class="btn-ask"><i class="fa-solid fa-plus"></i><span>Ask Question</span></a>
  </div>
</nav>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-section">
    <div class="sidebar-label">Navigation</div>
    <a href="index.html"       class="sidebar-link"><i class="fa-solid fa-house"></i> Home</a>
    <a href="questions.html"   class="sidebar-link active"><i class="fa-solid fa-circle-question"></i> Questions</a>
    <a href="tags.html"        class="sidebar-link"><i class="fa-solid fa-tags"></i> Tags</a>
    <a href="users.html"       class="sidebar-link"><i class="fa-solid fa-users"></i> Users</a>
    <a href="leaderboard.html" class="sidebar-link"><i class="fa-solid fa-trophy"></i> Leaderboard</a>
  </div>
  <div class="sidebar-divider"></div>
  <div class="sidebar-section">
    <div class="sidebar-label">Personal</div>
    <a href="saved.html" class="sidebar-link"><i class="fa-solid fa-bookmark"></i> Saved</a>
    <a href="activity.html" class="sidebar-link"><i class="fa-solid fa-chart-line"></i> Your Activity</a>
    <a href="my-questions.html" class="sidebar-link"><i class="fa-solid fa-list-ul"></i> Your Questions</a>
  </div>
  <div class="sidebar-divider"></div>
  <div class="sidebar-section">
    <div class="sidebar-label">Account</div>
    <a href="profile.html" class="sidebar-link"><i class="fa-solid fa-gear"></i> Settings</a>
    <button class="sidebar-link logout-item" id="sidebar-logout-btn"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
  </div>
</aside>

<main class="main-content">
  <div class="page-header">
    <div>
      <h1 class="page-title">All Questions</h1>
      <div class="page-subtitle">Browse, search, and filter community questions</div>
    </div>
    <a href="ask-question.html" class="btn btn-primary"><i class="fa-solid fa-plus"></i> Ask Question</a>
  </div>

  <!-- Toolbar -->
  <div class="questions-toolbar">
    <div class="search-inner">
      <i class="fa-solid fa-magnifying-glass"></i>
      <input type="search" id="q-search" placeholder="Search questions…">
    </div>
    <div class="filter-tabs" style="margin-bottom:0;">
      <button class="filter-tab active" data-filter="all">All</button>
      <button class="filter-tab" data-filter="unanswered">Unanswered</button>
      <button class="filter-tab" data-filter="trending">Trending</button>
      <button class="filter-tab" data-filter="newest">Newest</button>
    </div>
    <select class="form-control" style="width:auto;padding:9px 14px;">
      <option>Sort by: Votes</option>
      <option>Sort by: Newest</option>
      <option>Sort by: Views</option>
    </select>
  </div>

  <!-- Questions List -->
  <div id="questions-list">
    <!-- Populated by JS -->
  </div>

  <!-- Pagination -->
  <div class="pagination">
    <button class="page-btn" disabled><i class="fa-solid fa-chevron-left"></i></button>
    <button class="page-btn active">1</button>
    <button class="page-btn">2</button>
    <button class="page-btn">3</button>
    <button class="page-btn"><i class="fa-solid fa-chevron-right"></i></button>
  </div>
</main>

<script src="script.js"></script>
<script>
  document.getElementById('hamburger').addEventListener('click', () => {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('sidebar-overlay').classList.toggle('show');
  });
  document.getElementById('sidebar-overlay').addEventListener('click', () => {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebar-overlay').classList.remove('show');
  });
</script>
</body>
</html>
