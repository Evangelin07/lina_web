<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — Lina Community</title>
  <meta name="description" content="Enter a new password for your Lina Community account.">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="auth-page">

<div class="auth-container" style="max-width:500px; grid-template-columns: 1fr;">
  <!-- Form side only -->
  <div class="auth-form-side" style="padding:40px;">
    <div class="auth-logo" style="justify-content:center;">
      <div class="brand-icon"><i class="fa-solid fa-layer-group"></i></div>
      Lina Community
    </div>
    <h1 class="auth-title" style="text-align:center;">Reset Password</h1>
    <p class="auth-subtitle" style="text-align:center;">Create a strong new password for your account.</p>

    <form id="reset-password-form" novalidate>
      <div class="form-group">
        <label class="form-label" for="reset-password">New Password <span style="color:var(--danger)">*</span></label>
        <div class="input-group">
          <input type="password" id="reset-password" class="form-control" placeholder="At least 6 characters" required>
          <i class="fa-solid fa-eye input-suffix" data-toggle-password="reset-password"></i>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="reset-confirm">Confirm Password <span style="color:var(--danger)">*</span></label>
        <div class="input-group">
          <input type="password" id="reset-confirm" class="form-control" placeholder="Repeat your password" required>
          <i class="fa-solid fa-eye input-suffix" data-toggle-password="reset-confirm"></i>
        </div>
      </div>

      <button type="submit" class="btn btn-primary btn-full btn-lg">
        <i class="fa-solid fa-lock"></i> Save New Password
      </button>
    </form>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
